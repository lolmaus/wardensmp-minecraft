---
- name: Configure Minecraft VPS
  hosts: minecraft_servers
  become: true

  pre_tasks:
    - name: Remove stale Docker apt source list
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/docker.list
        state: absent

    - name: Remove stale Docker deb822 source file
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/docker.sources
        state: absent

    - name: Remove stale Docker gpg key
      ansible.builtin.file:
        path: /etc/apt/keyrings/docker.gpg
        state: absent

  tasks:
    - name: Set timezone
      ansible.builtin.timezone:
        name: "{{ server_timezone }}"

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
          - htop
          - rsync
          - ufw
          - unzip
        state: present
        update_cache: true

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication "
        line: "PasswordAuthentication no"
        validate: "sshd -t -f %s"
      notify: Restart ssh

    - name: Disable root SSH login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin "
        line: "PermitRootLogin no"
        validate: "sshd -t -f %s"
      notify: Restart ssh

    - name: Allow configured TCP ports
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ allowed_tcp_ports }}"

    - name: Enable UFW with default deny
      community.general.ufw:
        state: enabled
        policy: deny

    - name: Create stack directory
      ansible.builtin.file:
        path: "{{ minecraft_stack_root }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0755"

    - name: Remove conflicting Docker packages
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose
          - docker-compose-v2
          - docker-doc
          - podman-docker
          - containerd
          - runc
        state: absent

    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download Docker apt repository key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        owner: root
        group: root
        mode: "0644"

    - name: Get Debian package architecture
      ansible.builtin.command: dpkg --print-architecture
      register: dpkg_architecture
      changed_when: false

    - name: Add Docker apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.sources
        owner: root
        group: root
        mode: "0644"
        content: |
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: {{ ansible_distribution_release }}
          Components: stable
          Architectures: {{ dpkg_architecture.stdout }}
          Signed-By: /etc/apt/keyrings/docker.asc

    - name: Update apt cache after adding Docker repository
      ansible.builtin.apt:
        update_cache: true

    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Add admin user to docker group
      ansible.builtin.user:
        name: "{{ admin_user }}"
        groups:
          - docker
        append: true

    - name: Create stack subdirectories
      ansible.builtin.file:
        path: "{{ minecraft_stack_root }}/{{ item }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0755"
      loop:
        - caddy
        - data/caddy/data
        - data/caddy/config
        - data/crafty/backups
        - data/crafty/logs
        - data/crafty/servers
        - data/crafty/config
        - data/crafty/import

    - name: Copy Docker Compose file
      ansible.builtin.copy:
        src: ../compose/compose.yml
        dest: "{{ minecraft_stack_root }}/compose.yml"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0644"

    - name: Copy Compose environment file
      ansible.builtin.template:
        src: ../compose/.env.example
        dest: "{{ minecraft_stack_root }}/.env"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0644"

    - name: Copy Caddyfile
      ansible.builtin.copy:
        src: ../caddy/Caddyfile
        dest: "{{ minecraft_stack_root }}/caddy/Caddyfile"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0644"

    - name: Start Docker Compose stack
      community.docker.docker_compose_v2:
        project_src: "{{ minecraft_stack_root }}"
        state: present

  handlers:
    - name: Restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted
